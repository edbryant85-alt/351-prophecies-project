name: Refresh Refinement Dashboard

on:
  push:
    branches:
      - main
    paths:
      - "config/refinement-*.yaml"
      - "data/refinement-state.yaml"
      - "docs/style-guide.md"
      - "scripts/build_dashboard.py"
      - "scripts/refinement_*.py"
      - "scripts/check_*.py"
      - ".github/workflows/refinement-dashboard.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: python -m pip install PyYAML

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Commit dashboard if needed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet -- docs/refinement-dashboard.md docs/refinement-dashboard.json; then
            echo "No dashboard changes."
            exit 0
          fi
          git add docs/refinement-dashboard.md docs/refinement-dashboard.json
          git commit -m "Refresh refinement dashboard"
          git push
